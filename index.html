<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Egg Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }

        .game-container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            min-width: 400px;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 36px;
        }

        .egg-counter {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 30px;
            min-height: 40px;
        }

        .egg-button {
            width: 200px;
            height: 200px;
            border: none;
            border-radius: 50%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><defs><radialGradient id="eggGrad" cx="40%" cy="30%"><stop offset="0%" style="stop-color:%23fffacd;stop-opacity:1" /><stop offset="100%" style="stop-color:%23f5deb3;stop-opacity:1" /></radialGradient></defs><ellipse cx="100" cy="100" rx="85" ry="95" fill="url(%23eggGrad)" stroke="%23d4a574" stroke-width="2"/><ellipse cx="85" cy="80" rx="20" ry="25" fill="%23fffacd" opacity="0.7"/></svg>') center/contain no-repeat;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            margin: 0 auto 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: block;
        }

        .egg-button:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }

        .egg-button:active {
            transform: scale(0.98);
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
            font-size: 16px;
            color: #666;
        }

        .stat-item {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        .upgrades {
            margin-top: 40px;
            text-align: left;
        }

        .upgrades h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
            text-align: center;
        }

        .upgrade-btn {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .upgrade-btn:hover:not(:disabled) {
            border-color: #667eea;
            background: #f9f9ff;
        }

        .upgrade-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .upgrade-cost {
            font-weight: bold;
            color: #667eea;
            min-width: 80px;
            text-align: right;
        }

        .floating-text {
            position: fixed;
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            pointer-events: none;
            animation: float 1s ease-out forwards;
        }

        @keyframes float {
            from {
                opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 0;
                transform: translateY(-50px);
            }
        }

        .milestone {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            z-index: 1000;
            animation: milestoneShow 2s ease-out;
            pointer-events: none;
        }

        @keyframes milestoneShow {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .milestone h3 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .milestone p {
            font-size: 18px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🥚 EGG GAME 🥚</h1>
        <div class="egg-counter" id="eggCount">0 eggs</div>
        <button class="egg-button" id="eggButton"></button>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">Eggs Per Click</div>
                <div class="stat-value" id="eggPerClick">1</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Eggs Per Second</div>
                <div class="stat-value" id="eggsPerSecond">0</div>
            </div>
        </div>

        <div class="upgrades">
            <h2>🔧 Upgrades</h2>
            <button class="upgrade-btn" id="upgrade1">
                <span>2x Multiplier</span>
                <span class="upgrade-cost" id="cost1">50 🥚</span>
            </button>
            <button class="upgrade-btn" id="upgrade2">
                <span>Auto Clicker (1/sec)</span>
                <span class="upgrade-cost" id="cost2">100 🥚</span>
            </button>
            <button class="upgrade-btn" id="upgrade3">
                <span>Golden Egg (5x multiplier)</span>
                <span class="upgrade-cost" id="cost3">500 🥚</span>
            </button>
        </div>
    </div>

    <script>
        const eggButton = document.getElementById('eggButton');
        const eggCountDisplay = document.getElementById('eggCount');
        const eggPerClickDisplay = document.getElementById('eggPerClick');
        const eggsPerSecondDisplay = document.getElementById('eggsPerSecond');

        let eggs = 0;
        let eggPerClick = 1;
        let autoClickersCount = 0;
        let multiplier = 1;
        let hasGoldenEgg = false;

        const upgrades = {
            upgrade1: { cost: 50, bought: false },
            upgrade2: { cost: 100, bought: false, interval: null },
            upgrade3: { cost: 500, bought: false }
        };

        // Load game state from localStorage
        function loadGame() {
            const saved = localStorage.getItem('eggGameState');
            if (saved) {
                const state = JSON.parse(saved);
                eggs = state.eggs || 0;
                multiplier = state.multiplier || 1;
                autoClickersCount = state.autoClickersCount || 0;
                hasGoldenEgg = state.hasGoldenEgg || false;
                upgrades.upgrade1.bought = state.upgrade1 || false;
                upgrades.upgrade2.bought = state.upgrade2 || false;
                upgrades.upgrade3.bought = state.upgrade3 || false;
            }
        }

        // Save game state to localStorage
        function saveGame() {
            const state = {
                eggs,
                multiplier,
                autoClickersCount,
                hasGoldenEgg,
                upgrade1: upgrades.upgrade1.bought,
                upgrade2: upgrades.upgrade2.bought,
                upgrade3: upgrades.upgrade3.bought
            };
            localStorage.setItem('eggGameState', JSON.stringify(state));
        }

        function updateDisplay() {
            eggCountDisplay.textContent = eggs.toLocaleString() + ' eggs';
            eggPerClickDisplay.textContent = (eggPerClick * multiplier);
            eggsPerSecondDisplay.textContent = (autoClickersCount).toFixed(1);

            // Update upgrade buttons
            document.getElementById('upgrade1').disabled = eggs < upgrades.upgrade1.cost || upgrades.upgrade1.bought;
            document.getElementById('upgrade2').disabled = eggs < upgrades.upgrade2.cost || upgrades.upgrade2.bought;
            document.getElementById('upgrade3').disabled = eggs < upgrades.upgrade3.cost || upgrades.upgrade3.bought;

            // Update button text if bought
            if (upgrades.upgrade1.bought) document.getElementById('upgrade1').innerHTML = '<span>✓ 2x Multiplier</span><span class="upgrade-cost">OWNED</span>';
            if (upgrades.upgrade2.bought) document.getElementById('upgrade2').innerHTML = '<span>✓ Auto Clicker (1/sec)</span><span class="upgrade-cost">OWNED</span>';
            if (upgrades.upgrade3.bought) document.getElementById('upgrade3').innerHTML = '<span>✓ Golden Egg (5x multiplier)</span><span class="upgrade-cost">OWNED</span>';
        }

        function addEggs(amount) {
            const earnedEggs = amount * multiplier;
            eggs += earnedEggs;
            showFloatingText('+' + earnedEggs.toLocaleString(), event?.clientX || window.innerWidth / 2, event?.clientY || window.innerHeight / 2);
            updateDisplay();
            saveGame();
            checkMilestones();
        }

        function showFloatingText(text, x, y) {
            const span = document.createElement('div');
            span.className = 'floating-text';
            span.textContent = text;
            span.style.left = x + 'px';
            span.style.top = y + 'px';
            document.body.appendChild(span);
            setTimeout(() => span.remove(), 1000);
        }

        function showMilestone(title, message) {
            const milestone = document.createElement('div');
            milestone.className = 'milestone';
            milestone.innerHTML = `<h3>${title}</h3><p>${message}</p>`;
            document.body.appendChild(milestone);
            setTimeout(() => milestone.remove(), 2000);
        }

        function checkMilestones() {
            const milestones = [
                { eggs: 10, title: '🎉', msg: 'Keep cracking!' },
                { eggs: 100, title: '🌟', msg: 'You\'re doing great!' },
                { eggs: 1000, title: '👑', msg: 'Egg Master!' },
                { eggs: 10000, title: '💎', msg: 'Legendary Egg Collector!' }
            ];

            milestones.forEach(m => {
                if (eggs >= m.eggs && !localStorage.getItem(`milestone_${m.eggs}`)) {
                    localStorage.setItem(`milestone_${m.eggs}`, 'true');
                    showMilestone(m.title, m.msg);
                }
            });
        }

        // Click egg button
        eggButton.addEventListener('click', (e) => {
            addEggs(eggPerClick);
        });

        // Upgrade 1: 2x Multiplier
        document.getElementById('upgrade1').addEventListener('click', () => {
            if (eggs >= upgrades.upgrade1.cost && !upgrades.upgrade1.bought) {
                eggs -= upgrades.upgrade1.cost;
                multiplier *= 2;
                upgrades.upgrade1.bought = true;
                updateDisplay();
                saveGame();
            }
        });

        // Upgrade 2: Auto Clicker
        document.getElementById('upgrade2').addEventListener('click', () => {
            if (eggs >= upgrades.upgrade2.cost && !upgrades.upgrade2.bought) {
                eggs -= upgrades.upgrade2.cost;
                autoClickersCount += 1;
                upgrades.upgrade2.bought = true;

                // Start auto clicking at 1 egg per second
                setInterval(() => {
                    if (autoClickersCount > 0) {
                        eggs += autoClickersCount * multiplier;
                        eggsPerSecondDisplay.textContent = autoClickersCount.toFixed(1);
                        saveGame();
                    }
                }, 1000);

                updateDisplay();
                saveGame();
            }
        });

        // Upgrade 3: Golden Egg
        document.getElementById('upgrade3').addEventListener('click', () => {
            if (eggs >= upgrades.upgrade3.cost && !upgrades.upgrade3.bought) {
                eggs -= upgrades.upgrade3.cost;
                multiplier *= 5;
                hasGoldenEgg = true;
                upgrades.upgrade3.bought = true;
                showMilestone('✨', 'Golden Egg Unlocked!');
                updateDisplay();
                saveGame();
            }
        });

        // Initialize game
        loadGame();
        updateDisplay();

        // Auto-save every 5 seconds
        setInterval(saveGame, 5000);
    </script>
</body>
</html>
