<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Egg Game</title>
<style>
  :root{
    --bg:#cccaca;
    --line:#000;
    --paper:#fff;
  }

  *{box-sizing:border-box}
  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#fff;
    font-family:"Times New Roman", serif;
  }

  body{
    cursor:crosshair;
  }

  .egg-game-container *{
    -webkit-user-select:none;
    user-select:none;
  }

  .eggcellent-header{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    z-index:9999;
    height:10%;
    display:flex;
    justify-content:center;
    align-items:center;
    pointer-events:none;
  }

  .eggcellent-header .donate-wrapper{
    pointer-events:auto;
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
  }

  .eggcellent-header .donate-wrapper button{
    width:10vw;
    min-width:110px;
    height:6vh;
    border:.3vw solid black;
    background:#fff;
    font-weight:400;
    font-size:1.2vw;
    letter-spacing:.06em;
  }

  .eggcellent-header .og-artist{
    position:absolute;
    top:0;
    right:0;
    padding-right:3vw;
    font-size:1vw;
    pointer-events:auto;
  }

  .eggcellent-header .og-artist a{
    color:#000;
    text-decoration:none;
  }

  .egg-game-container{
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:99vh;
    width:100vw;
    margin-top:1.5vh;
  }

  .popup-wrapper{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:30;
    background:rgba(255,255,255,.06);
    pointer-events:auto;
  }

  .egg-game-wrapper{
    background:var(--bg);
    display:flex;
    flex-direction:column;
    height:85vh;
    width:90vw;
    border-bottom-left-radius:1.5vw;
    border-bottom-right-radius:1.5vw;
    border:.4vw solid black;
    position:relative;
    overflow:hidden;
  }

  .egg-game-header,
  .popup-header{
    background:
      repeating-linear-gradient(
        to right,
        transparent 0 10px,
        black 10px 12px,
        transparent 12px 22px
      );
    background-size:100% 10px;
    background-repeat:no-repeat;
    background-position:center;
  }

  .egg-game-header{
    height:5vh;
    width:100%;
    border-bottom:.4vw solid black;
    background-color:#fff;
  }

  .egg-game-body{
    position:relative;
    text-align:center;
    height:100%;
  }

  .egg-game-body h1{
    font-weight:400;
    font-size:2.7vw;
    letter-spacing:.08em;
    margin:.75em 0 .5em;
  }

  .egg-game-itself{
    height:75%;
    display:grid;
    grid-template-columns:1fr 1fr;
    align-items:end;
  }

  .egg-guy-container,
  .egg-basket-container{
    display:flex;
    align-items:flex-end;
    position:relative;
    height:100%;
  }

  .egg-guy,
  .egg-guy-down,
  .egg-guy-chewing{
    position:relative;
    display:flex;
    align-items:flex-end;
    width:100%;
    height:100%;
    margin-left:3vw;
  }

  .egg-guy-img-wrapper{
    display:flex;
    justify-content:center;
    align-items:flex-end;
    position:relative;
    width:35%;
    min-width:220px;
    max-width:430px;
  }

  .egg-guy-img-wrapper img,
  .egg-guy-img-wrapper svg{
    width:100%;
    display:block;
  }

  .egg-guy-chewing .egg-guy-img-wrapper::after{
    content:"";
    position:absolute;
    width:38%;
    height:7%;
    left:31%;
    top:34%;
    background:#000;
    border-radius:999px;
    animation:chew .4s linear 1;
    opacity:.95;
  }

  .egg-basket-wrapper{
    position:relative;
    display:flex;
    align-items:flex-end;
    width:100%;
    height:100%;
    margin-right:3vw;
    justify-content:flex-end;
  }

  .egg-basket,
  .draggable-container{
    position:absolute;
    width:25%;
    right:0;
    bottom:0;
  }

  .egg-basket{
    aspect-ratio:1 / 1;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    pointer-events:none;
  }

  .basket-svg{
    width:100%;
    height:auto;
    display:block;
  }

  .draggable-container{
    aspect-ratio:1 / 1;
    touch-action:none;
  }

  .draggable-egg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
  }

  .draggable-egg-inner{
    position:absolute;
    width:30%;
    left:50%;
    top:48%;
    transform:translate(-50%,-50%);
    pointer-events:none;
  }

  .eggs-count{
    text-align:right;
    width:93%;
    bottom:-5vh;
    right:0;
    position:absolute;
    font-size:1vw;
    letter-spacing:.08em;
  }

  .popup-container{
    background:white;
    width:40vw;
    max-width:620px;
    height:35vh;
    max-height:300px;
    border:.3vw solid black;
    box-shadow:0 14px 30px rgba(0,0,0,.18);
  }

  .popup-header{
    background-color:#fff;
    height:3vh;
    width:100%;
    border-bottom:.3vw solid black;
  }

  .popup-body{
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
    height:calc(100% - 3vh);
    border:.2vw solid #cccaca;
    border-top:transparent;
    text-align:center;
    padding:1rem;
    background:#fff;
  }

  .popup-body h2{
    font-size:1.45vw;
    font-weight:400;
    letter-spacing:.06em;
    margin:0;
  }

  .EGGS-TEXT-CONTAINER{
    width:80%;
  }

  .ran-out-text-area{
    max-width:100%;
    width:100%;
    border:2px solid #000;
    font-size:1.2vw;
    letter-spacing:1.5px;
    padding:.5vw;
    margin-top:1rem;
  }

  .donate-container{
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    gap:1rem;
  }

  .donate-container a{
    color:#000;
    text-decoration:underline;
  }

  .walking-egg{
    position:absolute;
    width:132%;
    bottom:0;
    animation:walk 5s linear forwards;
    z-index:5;
  }

  .show-ass{
    position:absolute;
    width:132%;
    bottom:0;
    transform:translate(35vw);
    animation:no-anim 9s linear forwards;
    z-index:6;
  }

  .hidden{
    display:none !important;
  }

  @keyframes chew{
    0%{width:10%}
    25%{width:50%}
    50%{width:10%}
    75%{width:50%}
    100%{width:10%}
  }

  @keyframes walk{
    0%,30%{transform:translate(0)}
    100%{transform:translate(35vw)}
  }

  @keyframes no-anim{
    0%{transform:translate(35vw)}
    100%{transform:translate(35vw)}
  }

  @media (max-width: 768px) and (orientation: portrait){
    .eggcellent-header .og-artist{font-size:3vw}
    .eggcellent-header .donate-wrapper button{
      width:25vw;
      min-width:0;
      height:4.3vh;
      font-size:3vw;
      border:.5vw solid black;
    }
    .egg-game-body h1{font-size:6vw}
    .egg-guy-img-wrapper{width:80%; min-width:160px}
    .egg-basket,.draggable-container{width:50%}
    .eggs-count{font-size:4vw; width:97%}
    .popup-container{width:70vw; height:25vh}
    .popup-body h2{font-size:4vw}
    .ran-out-text-area{font-size:4vw; padding:2vw}
    .show-ass{transform:translate(25vw)}
    @keyframes walk{
      0%,30%{transform:translate(0)}
      100%{transform:translate(25vw)}
    }
    @keyframes no-anim{
      0%{transform:translate(25vw)}
      100%{transform:translate(25vw)}
    }
  }
</style>
</head>
<body>
<div class="eggcellent-header">
  <div class="donate-wrapper">
    <button id="donateBtn">DONATE</button>
  </div>
</div>

<div class="egg-game-container">
  <div class="egg-game-wrapper">
    <div class="egg-game-header"></div>
    <div class="egg-game-body">
      <h1>FEED EGGS</h1>

      <div class="egg-game-itself">
        <div class="egg-guy-container">
          <div id="eggGuy" class="egg-guy-down">
            <div class="egg-guy-img-wrapper" id="eggTargetWrap">
              <div id="walkingEgg" class="walking-egg hidden"></div>
              <div id="showAss" class="show-ass hidden"></div>

              <div id="eggFaceContainer"></div>
            </div>
          </div>
        </div>

        <div class="egg-basket-container">
          <div class="egg-basket-wrapper">
            <div class="egg-basket" aria-hidden="true">
              <svg class="basket-svg" viewBox="0 0 200 200">
                <path d="M35 140
                         C20 118, 18 92, 35 72
                         C52 52, 82 45, 100 60
                         C118 45, 148 52, 165 72
                         C182 92, 180 118, 165 140
                         L154 178
                         L46 178 Z"
                      fill="#fff" stroke="#000" stroke-width="6"/>
                <path d="M46 178 H154" stroke="#000" stroke-width="8"/>
                <path d="M63 142 C74 117, 90 103, 100 103 C110 103, 126 117, 137 142"
                      fill="none" stroke="#000" stroke-width="6"/>
              </svg>
            </div>

            <div class="draggable-container" id="dragArea">
              <div class="draggable-egg" id="draggableEgg">
                <div class="draggable-egg-inner" id="eggDragVisual"></div>
              </div>
            </div>

            <p class="eggs-count hidden" id="eggsCountLabel">EGGS: 80</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="popup-wrapper hidden" id="popupWrap">
    <div class="popup-container">
      <div class="popup-header"></div>
      <div class="popup-body" id="popupBody"></div>
    </div>
  </div>
</div>

<script>
  const state = {
    totalFed: 0,
    dragging: false,
    chewing: false,
    disabled: false,
    basketEggs: 80,
    hasBoughtEggs: false,
    popupOpen: false,
    won: false,
    startWinAnimation: false,
    buttDone: false,
    randomPopupTimer: null,
    randomPopupValue: 0
  };

  const eggGuy = document.getElementById('eggGuy');
  const eggTargetWrap = document.getElementById('eggTargetWrap');
  const eggFaceContainer = document.getElementById('eggFaceContainer');
  const dragArea = document.getElementById('dragArea');
  const draggableEgg = document.getElementById('draggableEgg');
  const eggDragVisual = document.getElementById('eggDragVisual');
  const popupWrap = document.getElementById('popupWrap');
  const popupBody = document.getElementById('popupBody');
  const donateBtn = document.getElementById('donateBtn');
  const eggsCountLabel = document.getElementById('eggsCountLabel');
  const walkingEgg = document.getElementById('walkingEgg');
  const showAss = document.getElementById('showAss');

  function eggSVG(mode = 'down') {
    let mouth = '';
    if (mode === 'down') {
      mouth = `<ellipse cx="50" cy="53.5" rx="19" ry="20.5" fill="#000"/>`;
    } else if (mode === 'up') {
      mouth = `<ellipse cx="50" cy="42.5" rx="19" ry="20.5" fill="#000"/>`;
    } else if (mode === 'closed') {
      mouth = `<ellipse cx="50" cy="39.5" rx="12" ry="3.8" fill="#000"/>`;
    }

    return `
      <svg viewBox="0 0 100 120" aria-hidden="true">
        <rect width="100" height="120" fill="#d9d9d9"/>
        <ellipse cx="50" cy="58" rx="45" ry="54" fill="#e6e6e6" stroke="#000" stroke-width="1.6"/>
        <circle cx="37" cy="26" r="6.2" fill="#fff" stroke="#000" stroke-width="1.2"/>
        <circle cx="63" cy="26" r="6.2" fill="#fff" stroke="#000" stroke-width="1.2"/>
        <circle cx="37" cy="26.4" r="1.0" fill="#000"/>
        <circle cx="63" cy="26.4" r="1.0" fill="#000"/>
        ${mouth}
        <path d="M5 118
                 C6 111, 9 105, 15 102
                 C21 99, 27 100, 31 104
                 L31 102
                 L31 88
                 L38 94
                 L38 118 Z"
              fill="#e6e6e6" stroke="#000" stroke-width="1.5"/>
        <path d="M95 118
                 C94 111, 91 105, 85 102
                 C79 99, 73 100, 69 104
                 L69 102
                 L69 88
                 L62 94
                 L62 118 Z"
              fill="#e6e6e6" stroke="#000" stroke-width="1.5"/>
      </svg>
    `;
  }

  function smallEggSVG() {
    return `
      <svg viewBox="0 0 100 120" aria-hidden="true">
        <ellipse cx="50" cy="60" rx="35" ry="48" fill="#efefef" stroke="#000" stroke-width="6"/>
        <circle cx="37" cy="44" r="6" fill="#fff" stroke="#000" stroke-width="4"/>
        <circle cx="63" cy="44" r="6" fill="#fff" stroke="#000" stroke-width="4"/>
        <circle cx="37" cy="44" r="2" fill="#000"/>
        <circle cx="63" cy="44" r="2" fill="#000"/>
        <ellipse cx="50" cy="70" rx="16" ry="19" fill="#000"/>
      </svg>
    `;
  }

  function censoredButtSVG() {
    return `
      <svg viewBox="0 0 200 160" aria-hidden="true">
        <ellipse cx="100" cy="80" rx="72" ry="54" fill="#e8e8e8" stroke="#000" stroke-width="6"/>
        <ellipse cx="76" cy="84" rx="28" ry="34" fill="#d9d9d9" stroke="#000" stroke-width="4"/>
        <ellipse cx="124" cy="84" rx="28" ry="34" fill="#d9d9d9" stroke="#000" stroke-width="4"/>
        <text x="100" y="86" text-anchor="middle" font-size="20" fill="#fff" font-family="Arial">STEVE WAS HERE</text>
      </svg>
    `;
  }

  function renderEggFace() {
    if (state.startWinAnimation && !state.buttDone) {
      eggFaceContainer.innerHTML = '';
      walkingEgg.classList.remove('hidden');
      walkingEgg.innerHTML = smallEggSVG();
      showAss.classList.add('hidden');
      return;
    }

    if (state.buttDone) {
      eggFaceContainer.innerHTML = '';
      walkingEgg.classList.add('hidden');
      showAss.classList.remove('hidden');
      showAss.innerHTML = censoredButtSVG();
      return;
    }

    walkingEgg.classList.add('hidden');
    showAss.classList.add('hidden');

    if (state.chewing) {
      eggFaceContainer.innerHTML = eggSVG('closed');
      eggGuy.className = 'egg-guy-chewing';
    } else if (state.dragging) {
      eggFaceContainer.innerHTML = eggSVG('up');
      eggGuy.className = 'egg-guy';
    } else {
      eggFaceContainer.innerHTML = eggSVG('down');
      eggGuy.className = 'egg-guy-down';
    }
  }

  function renderDragEgg() {
    eggDragVisual.innerHTML = smallEggSVG();
  }

  function updateEggCountLabel() {
    if (state.hasBoughtEggs) {
      eggsCountLabel.classList.remove('hidden');
      eggsCountLabel.textContent = 'EGGS: ' + state.basketEggs;
    } else {
      eggsCountLabel.classList.add('hidden');
    }
  }

  function speak(text, opts = {}) {
    try {
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'en-US';
      utter.pitch = opts.pitch ?? 1.2;
      utter.rate = opts.rate ?? 1.0;
      window.speechSynthesis.speak(utter);
      if (typeof opts.onend === 'function') utter.onend = opts.onend;
    } catch (err) {}
  }

  function showPopup(html) {
    state.popupOpen = true;
    popupBody.innerHTML = html;
    popupWrap.classList.remove('hidden');
  }

  function hidePopup() {
    state.popupOpen = false;
    popupWrap.classList.add('hidden');
    popupBody.innerHTML = '';
  }

  function showEggCountPopup(num) {
    showPopup(`<h2>${num} EGGS</h2>`);
    speak(`${num} eggs`, { pitch: 1.7, rate: 0.9 });
    setTimeout(() => {
      if (!state.won && !state.disabled) hidePopup();
    }, 2200);
  }

  function showDonatePopup() {
    state.disabled = true;
    showPopup(`
      <div class="donate-container">
        <h2>YOU GOTTA GIVE BRYAN A PLAQUE</h2>
      </div>
    `);
    speak('You gotta give Bryan a plaque');
    popupWrap.onclick = (e) => {
      if (e.target === popupWrap) {
        popupWrap.onclick = null;
        state.disabled = false;
        hidePopup();
      }
    };
  }

  function showRanOutPopup() {
    state.disabled = true;
    showPopup(`
      <div class="EGGS-TEXT-CONTAINER">
        <h2>Dude, you ran out of eggs. Would you like to buy an 80 pack of eggs?</h2>
        <input class="ran-out-text-area" id="buyEggsInput" type="text" placeholder="YES or NO" />
      </div>
    `);
    speak('Dude, you ran out of eggs. Would you like to buy an 80 pack of eggs?');

    const input = document.getElementById('buyEggsInput');
    input?.focus();
    input?.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        state.hasBoughtEggs = true;
        state.basketEggs = 80;
        state.disabled = false;
        hidePopup();
        updateEggCountLabel();
      }
    });
  }

  function showWinPopup() {
    state.won = true;
    state.disabled = true;
    showPopup(`<h2>41 EGGS</h2>`);
    speak('41 eggs you win', {
      pitch: 1.7,
      rate: 0.9,
      onend: () => {
        setTimeout(() => {
          popupBody.innerHTML = `<h2>Congrats big boy</h2>`;
          speak('Congrats big boy', {
            pitch: 1.7,
            rate: 0.9,
            onend: () => {
              setTimeout(() => {
                hidePopup();
                state.startWinAnimation = true;
                renderEggFace();
              }, 500);
            }
          });
        }, 450);
      }
    });
  }

  function showNudeEggPopup() {
    state.buttDone = true;
    renderEggFace();
    showPopup(`<h2>You're looking at a nude egg.</h2>`);
    speak("You're looking at a nude egg.", {
      pitch: 1.7,
      rate: 0.9,
      onend: () => {
        setTimeout(() => {
          location.reload();
        }, 5000);
      }
    });
  }

  function maybeTriggerRandomPopup() {
    const delay = Math.floor(Math.random() * 80000) + 20000;
    clearTimeout(state.randomPopupTimer);
    state.randomPopupTimer = setTimeout(() => {
      if (state.popupOpen || state.disabled || state.won) {
        maybeTriggerRandomPopup();
        return;
      }

      const rand = Math.random() <= 0.02
        ? Math.floor(Math.random() * 900) + 100
        : Math.floor(Math.random() * 100);

      state.randomPopupValue = rand;
      showEggCountPopup(rand);
      setTimeout(() => {
        hidePopup();
        maybeTriggerRandomPopup();
      }, 4000);
    }, delay);
  }

  function updateBasketAfterFeed() {
    if (state.totalFed === 10) {
      state.disabled = true;
      showRanOutPopup();
    }

    if (state.totalFed === 11) {
      state.basketEggs = 40;
      updateEggCountLabel();
      state.disabled = false;
    } else if (state.totalFed > 11) {
      state.basketEggs -= 1;
      updateEggCountLabel();
    }

    if (state.totalFed === 41) {
      showWinPopup();
    }

    if ((state.basketEggs === 0 || state.basketEggs === Math.floor(Math.random() * 200)) && state.hasBoughtEggs && !state.won) {
      state.hasBoughtEggs = false;
      state.basketEggs = 80;
      updateEggCountLabel();
      state.disabled = true;
      showRanOutPopup();
    }
  }

  function feedEgg() {
    if (state.won) return;

    state.totalFed += 1;
    state.chewing = true;
    renderEggFace();

    setTimeout(() => {
      state.chewing = false;
      renderEggFace();
      updateBasketAfterFeed();
    }, 420);
  }

  function rectNear(a, b) {
    return (
      a.right < b.right + b.width * 0.2 &&
      a.left > b.left - b.width * 0.2 &&
      a.top > b.top - b.height * 0.2 &&
      a.bottom < b.bottom + b.height * 0.2
    );
  }

  let dragPointerId = null;
  let startX = 0;
  let startY = 0;
  let currentX = 0;
  let currentY = 0;

  function resetDrag() {
    dragPointerId = null;
    state.dragging = false;
    draggableEgg.style.transform = '';
    renderEggFace();
  }

  dragArea.addEventListener('pointerdown', (e) => {
    if (state.disabled || state.popupOpen || state.won || state.startWinAnimation) return;
    dragPointerId = e.pointerId;
    dragArea.setPointerCapture(e.pointerId);
    startX = e.clientX;
    startY = e.clientY;
    currentX = 0;
    currentY = 0;
    state.dragging = true;
    renderEggFace();
  });

  dragArea.addEventListener('pointermove', (e) => {
    if (dragPointerId !== e.pointerId) return;
    currentX = e.clientX - startX;
    currentY = e.clientY - startY;
    draggableEgg.style.transform = `translate(${currentX}px, ${currentY}px)`;
  });

  dragArea.addEventListener('pointerup', (e) => {
    if (dragPointerId !== e.pointerId) return;

    const targetRect = eggTargetWrap.getBoundingClientRect();
    const eggRect = eggDragVisual.getBoundingClientRect();

    if (rectNear(eggRect, targetRect) && !state.disabled && !state.popupOpen) {
      feedEgg();
    }

    resetDrag();
  });

  dragArea.addEventListener('pointercancel', () => {
    resetDrag();
  });

  donateBtn.addEventListener('click', () => {
    if (state.popupOpen) return;
    showDonatePopup();
  });

  walkingEgg.addEventListener('animationend', () => {
    if (state.startWinAnimation && !state.buttDone) {
      showNudeEggPopup();
    }
  });

  renderEggFace();
  renderDragEgg();
  updateEggCountLabel();
  maybeTriggerRandomPopup();

  console.log("yeah yeah yeah yeah yeah yeah ohhhhhohhhohh");
</script>
</body>
</html>
